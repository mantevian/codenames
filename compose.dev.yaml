services:
  rabbitmq:
    image: rabbitmq:4.2-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - microservices-network

  postgres:
    image: postgres:17-alpine
    container_name: postgres_container
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_URL: ${POSTGRES_URL}
    env_file:
      - .env
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d codenames"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - microservices-network
  
  pgadmin:
    container_name: pgadmin_container
    image: dpage/pgadmin4:7.2
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      GUNICORN_ACCESS_LOGFILE: "/dev/null"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    networks:
      - microservices-network

  gateway:
    build:
      context: .
      dockerfile: ./services/gateway/Dockerfile.dev
    container_name: gateway-service-dev
    ports:
      - "8080:8080"
      - "5173:5173"
    environment:
      PORT: 8080
      RABBITMQ_URL: "amqp://rabbitmq:5672"
      DEBUG: true
    volumes:
      - ./services/gateway/backend:/app/services/gateway/backend
      - ./services/gateway/frontend:/app/services/gateway/frontend
      - ./shared:/app/shared
      - go-mod-cache:/go/pkg/mod
      - node-modules:/app/frontend/node_modules
    networks:
      - microservices-network
    depends_on:
      rabbitmq:
        condition: service_healthy
  
  auth:
    build:
      context: .
      dockerfile: ./services/auth/Dockerfile.dev
    container_name: auth-service-dev
    environment:
      RABBITMQ_URL: "amqp://rabbitmq:5672"
      POSTGRES_URL: ${POSTGRES_URL}
      DEBUG: true
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./services/auth:/app/services/auth
      - ./shared:/app/shared
      - go-mod-cache:/go/pkg/mod
    networks:
      - microservices-network
    depends_on:
      rabbitmq:
        condition: service_healthy

networks:
  microservices-network:
    driver: bridge

volumes:
  go-mod-cache:
  node-modules:
  postgres-data:
  pgadmin-data: