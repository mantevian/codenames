services:
  rabbitmq:
    image: rabbitmq:4.2
    ports:
      - 5672:5672
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - microservices-network

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - 8080:8080
    environment:
      - PORT=8080
      - RABBITMQ_URL=amqp://rabbitmq:5672
    networks:
      - microservices-network
    depends_on:
      rabbitmq:
        condition: service_healthy

networks:
  microservices-network:
    driver: bridge
